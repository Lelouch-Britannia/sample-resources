# Pre-commit hooks for validating YAML and maintaining code quality
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        name: Check YAML syntax
        args: ['--unsafe']  # Allow custom YAML tags
      
      - id: end-of-file-fixer
        name: Fix end of files
        exclude: '.*(\.md|\.txt)$'
      
      - id: trailing-whitespace
        name: Trim trailing whitespace
      
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=500']
      
      - id: check-merge-conflict
        name: Check for merge conflicts
      
      - id: mixed-line-ending
        name: Check line endings

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        name: Lint YAML files
        args: [
          '--config-data',
          '{extends: default, rules: {line-length: {max: 120}, comments: {min-spaces-from-content: 1}}}'
        ]
        files: \.(yaml|yml)$

  # Python code formatting (for validation scripts)
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        name: Format Python code
        language_version: python3

  # Custom validation for learning units
  - repo: local
    hooks:
      - id: validate-learning-units
        name: Validate Learning Unit Structure
        entry: python scripts/validate_learning_units.py
        language: system
        files: \.(yaml|yml)$
        pass_filenames: true
