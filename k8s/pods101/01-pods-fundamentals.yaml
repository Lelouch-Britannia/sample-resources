    question: "Why does Kubernetes use a Pod as the smallest deployable unit instead of a single container?"
    options:
      - id: "a"
        text: "To make Kubernetes more complex and enterprise-ready"
      - id: "b"
        text: "To add an abstraction layer for managing containers with additional properties like restart policies and liveness probes"
      - id: "c"
        text: "Because Docker requires it"
      - id: "d"
        text: "To increase resource consumption"
  
  - id: "q3"
    question: "What do containers within the same Pod share?"
    options:
      - id: "a"
        text: "Only the same CPU resources"
      - id: "b"
        text: "Network namespace (IP address and port space), IPC namespace, and volumes"
      - id: "c"
