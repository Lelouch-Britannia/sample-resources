  quiz_explanations:
    q1: "A Kubernetes Pod is the smallest deployable unit in Kubernetes that can host one or more containers. It's not limited to a single container and provides an abstraction layer over the actual container runtime (Docker, rkt, etc.)."
    q2: "Kubernetes uses Pods as an abstraction layer to add additional properties needed for container management, such as restart policies, liveness probes, and readiness checks. This avoids overloading the existing container concept with Kubernetes-specific properties."
    q3: "Containers within the same Pod share the network namespace (same IP address and port space), IPC namespace, and can share volumes. This enables efficient communication and data locality between tightly coupled containers."
    q4: "Containers in the same Pod use the same network namespace, which means they share the same IP address and can communicate via localhost (127.0.0.1) as if they were running on the same physical host. This makes inter-container communication very efficient."
    q5: "Following the 'one process per container' principle makes troubleshooting easier (logs don't mix), simplifies process lifecycle management (handling zombie processes), enables software decoupling (independent dependencies), and allows containers to be reused across different applications and teams."
    q6: "The kubectl describe pod command provides detailed information about a Pod's state, including events that show why it failed to start. This is the primary diagnostic tool for Pod startup failures, showing error messages, failed health checks, and scheduling issues."
  
