quizzes:
  - id: "q1"
    question: "What are labels in Kubernetes?"
    options:
      - id: "a"
        text: "Commands used to execute operations on Pods"
      - id: "b"
        text: "Key-value pairs attached to objects for identification and categorization"
      - id: "c"
        text: "Network policies that control traffic"
      - id: "d"
        text: "Volume mount points in containers"
  
  - id: "q2"
    question: "Which kubectl command fetches all Pods with the label 'app=nginx'?"
    options:
      - id: "a"
        text: "kubectl get pods --label app=nginx"
      - id: "b"
        text: "kubectl get pods -l app=nginx"
      - id: "c"
        text: "kubectl get pods --filter app=nginx"
      - id: "d"
        text: "kubectl select pods app=nginx"
  
  - id: "q3"
    question: "In a ReplicaSet, what does the 'selector.matchLabels' field do?"
    options:
      - id: "a"
        text: "Specifies which container image to use"
      - id: "b"
        text: "Defines network ports to expose"
      - id: "c"
        text: "Identifies which Pods the ReplicaSet should manage based on their labels"
      - id: "d"
        text: "Sets resource limits for the Pods"
  
  - id: "q4"
    question: "Can a single Pod have multiple labels?"
    options:
      - id: "a"
        text: "No, each Pod can only have one label"
      - id: "b"
        text: "Yes, Pods can have multiple labels for different categorization purposes"
      - id: "c"
        text: "Only if the Pod has multiple containers"
      - id: "d"
        text: "Labels are not supported on Pods"
  
  - id: "q5"
    question: "What happens if a ReplicaSet's selector doesn't match any existing Pods?"
    options:
      - id: "a"
        text: "The ReplicaSet will fail to create"
      - id: "b"
        text: "Kubernetes will automatically assign labels to existing Pods"
      - id: "c"
        text: "The ReplicaSet will create new Pods with labels matching the selector"
      - id: "d"
        text: "The ReplicaSet will wait indefinitely for matching Pods"
  
  - id: "q6"
    question: "What is a common pitfall when working with ReplicaSet selectors?"
    options:
      - id: "a"
        text: "Using too few labels in the selector"
      - id: "b"
        text: "The selector.matchLabels doesn't match the Pod template labels"
      - id: "c"
        text: "Labels can only be alphanumeric characters"
      - id: "d"
        text: "ReplicaSets don't support label selectors"
      - id: "c"
        text: "The ReplicaSet will create new Pods with matching labels"
      - id: "d"
        text: "The cluster will shut down"

