    q1: "Labels are key-value pairs that can be attached to Kubernetes objects like Pods for identification, organization, and categorization. Examples include 'app: nginx' or 'environment: production'."
    q2: "The kubectl get pods -l command uses the -l or --selector flag to filter Pods based on label selectors. For example, 'kubectl get pods -l app=nginx' returns all Pods labeled with app=nginx."
    q3: "The selector.matchLabels field in a ReplicaSet defines which Pods the ReplicaSet should manage. The ReplicaSet will only control Pods that have labels matching this selector, enabling precise Pod management."
