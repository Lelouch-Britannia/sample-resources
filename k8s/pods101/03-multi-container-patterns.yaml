  quiz_explanations:
    q1: "Sidecar containers are helper containers that support the main application container. Common examples include log watchers, monitoring adapters, data loaders, or file generators. They run alongside the main container and provide auxiliary functionality."
    q2: "An emptyDir volume has the same lifetime as the Pod. When a Pod is deleted, the emptyDir volume and all its data are permanently deleted. This type of volume is useful for temporary data that doesn't need to survive Pod restarts or deletions."
    q3: "The ambassador pattern (also called proxy or adapter pattern) uses a helper container to act as a proxy or bridge between the main container and external services. For example, it can allow the main container to connect to localhost while the proxy handles actual external connections and service discovery."
    q4: "Using multiple containers follows the 'one process per container' principle, which makes troubleshooting easier (separate logs), simplifies process lifecycle management, enables software decoupling, and allows containers to be reused across different applications and teams."
    q5: "Containers in the same Pod can share data through shared volumes. Each container mounts the same volume to its own path (which can be different), allowing them to read and write files that the other container can access. For example, one container writes to /var/log and another reads from /logs, both pointing to the same emptyDir volume."
    q6: "The ambassador pattern uses a proxy container to handle communication between the main application and external services. This allows the app to connect to localhost while the proxy manages service discovery, authentication, load balancing, and external network connections. Common examples include Cloud SQL proxies and service mesh sidecars."
  
