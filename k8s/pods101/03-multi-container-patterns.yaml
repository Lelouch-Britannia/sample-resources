# ===== QUIZ CONFIGURATION (Public - NO answers) =====
quizzes:
  - id: "q1"
    question: "What is the primary purpose of a sidecar container?"
    options:
      - id: "a"
        text: "To replace the main application container when it fails"
      - id: "b"
        text: "To provide supporting functionality like logging, monitoring, or data loading for the main container"
      - id: "c"
        text: "To serve as a backup in case of high traffic"
      - id: "d"
        text: "To store persistent data"
  
  - id: "q2"
    question: "What happens to data in an emptyDir volume when the Pod is deleted?"
    options:
      - id: "a"
        text: "The data is automatically backed up to cloud storage"
      - id: "b"
        text: "The data is moved to a PersistentVolume"
      - id: "c"
        text: "The data is permanently deleted along with the Pod"
      - id: "d"
        text: "The data is transferred to a new Pod"
  
  - id: "q3"
    question: "Which pattern describes using a container to connect the main application to external services?"
    options:
      - id: "a"
        text: "Sidecar pattern"
      - id: "b"
        text: "Ambassador pattern (proxy/adapter)"
      - id: "c"
        text: "Init container pattern"
      - id: "d"
        text: "DaemonSet pattern"
  
  - id: "q4"
    question: "Why should you use multiple containers in a Pod instead of combining all processes into one container?"
    options:
      - id: "a"
        text: "To use more memory"
      - id: "b"
        text: "To enable better separation of concerns, easier troubleshooting, and container reusability"
      - id: "c"
        text: "It's mandatory in Kubernetes"
      - id: "d"
        text: "To avoid network overhead"
  
  - id: "q5"
    question: "How can two containers in the same Pod share data efficiently?"
    options:
      - id: "a"
        text: "By making HTTP requests to each other"
      - id: "b"
        text: "By mounting the same volume to different paths in each container"
      - id: "c"
        text: "Through a ConfigMap"
      - id: "d"
        text: "They cannot share data"

