    q1: "A ReplicaSet is a Kubernetes controller designed to maintain a specific number of pod replicas running at any given time. It ensures high availability by automatically replacing failed pods and terminating excess pods to match the desired state."
    q2: "ReplicaSets use label selectors to identify which pods they should manage. The selector defined in spec.selector.matchLabels must match the labels on the pods. The ReplicaSet also checks the ownerReferences field to ensure the pod isn't already managed by another controller."
    q3: "When a pod managed by a ReplicaSet fails or is deleted, the ReplicaSet controller automatically detects the change and creates a new pod using its pod template to restore the desired number of replicas. This self-healing capability is a core feature of ReplicaSets."
