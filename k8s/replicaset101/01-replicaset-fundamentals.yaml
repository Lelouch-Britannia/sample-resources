quizzes:
  - id: "q1"
    question: "What is the primary purpose of a Kubernetes ReplicaSet?"
    options:
      - id: "a"
        text: "To deploy pods to multiple clusters"
      - id: "b"
        text: "To maintain a specific number of pod replicas running at any given time"
      - id: "c"
        text: "To manage container images"
      - id: "d"
        text: "To create persistent storage volumes"
  
  - id: "q2"
    question: "How does a ReplicaSet identify which pods it should manage?"
    options:
      - id: "a"
        text: "By the pod's creation timestamp"
      - id: "b"
        text: "By matching labels defined in the selector with pod labels"
      - id: "c"
        text: "By the pod's IP address"
      - id: "d"
        text: "By the pod's namespace only"
  
  - id: "q3"
    question: "What happens when a pod managed by a ReplicaSet fails or is deleted?"
    options:
      - id: "a"
        text: "The ReplicaSet does nothing until manually instructed"
      - id: "b"
        text: "The ReplicaSet automatically creates a new pod to maintain the desired count"
      - id: "c"
        text: "All other pods are also deleted"
      - id: "d"
        text: "The ReplicaSet sends an alert and waits"
  
  - id: "q4"
    question: "What is the relationship between ReplicationControllers and ReplicaSets?"
    options:
      - id: "a"
        text: "They are completely different and unrelated"
      - id: "b"
        text: "ReplicationControllers are newer and more advanced"
      - id: "c"
        text: "ReplicaSets are the successors of ReplicationControllers and are recommended for use"
      - id: "d"
        text: "They must be used together"
  
  - id: "q5"
    question: "What field in a ReplicaSet definition specifies the desired number of pod replicas?"
    options:
      - id: "a"
        text: "spec.count"
      - id: "b"
        text: "spec.replicas"
      - id: "c"
        text: "spec.instances"
      - id: "d"
        text: "metadata.replicas"

