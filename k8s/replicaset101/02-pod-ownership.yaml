quizzes:
  - id: "q1"
    question: "How does a ReplicaSet verify that a pod is not already owned by another controller?"
    options:
      - id: "a"
        text: "By checking the pod's namespace"
      - id: "b"
        text: "By examining the ownerReferences field in the pod's metadata"
      - id: "c"
        text: "By checking the pod's creation timestamp"
      - id: "d"
        text: "ReplicaSets don't check ownership, they can control any pod"
  
  - id: "q2"
    question: "What happens if you create a bare pod (not owned by any controller) with a label that matches a ReplicaSet's selector?"
    options:
      - id: "a"
        text: "The pod is ignored by the ReplicaSet"
      - id: "b"
        text: "Kubernetes prevents the pod from being created"
      - id: "c"
        text: "The ReplicaSet will adopt the pod and may terminate it if over the desired replica count"
      - id: "d"
        text: "The ReplicaSet is automatically deleted"
  
  - id: "q3"
    question: "How can you remove a pod from ReplicaSet management without deleting it?"
    options:
      - id: "a"
        text: "Delete the ReplicaSet"
      - id: "b"
        text: "Change the pod's label so it no longer matches the ReplicaSet selector"
      - id: "c"
        text: "Move the pod to a different namespace"
      - id: "d"
        text: "It's not possible to remove a pod from ReplicaSet management"
  
  - id: "q4"
    question: "If you isolate a pod from a ReplicaSet by changing its labels, what happens to the replica count?"
    options:
      - id: "a"
        text: "The ReplicaSet creates a new pod to maintain the desired count"
      - id: "b"
        text: "The ReplicaSet decreases its desired count automatically"
      - id: "c"
        text: "The isolated pod is automatically deleted"
      - id: "d"
        text: "The ReplicaSet stops functioning"
  
  - id: "q5"
    question: "What is the recommended best practice regarding bare pods and ReplicaSets?"
    options:
      - id: "a"
        text: "Always create bare pods first, then create the ReplicaSet"
      - id: "b"
        text: "Never use labels on bare pods"
      - id: "c"
        text: "Always use a controller like a ReplicaSet to create and maintain pods, avoid creating bare pods with matching labels"
      - id: "d"
        text: "Create bare pods and ReplicaSets simultaneously"

