  quiz_explanations:
    q1: "A ReplicaSet checks the ownerReferences field in the pod's metadata to determine if the pod is already managed by another controller. This field contains information about the controller that owns the pod. If the field is empty or doesn't reference another controller, the ReplicaSet can adopt the pod."
    q2: "If you create a bare pod with labels matching a ReplicaSet's selector, the ReplicaSet will automatically adopt it. If this causes the total number of managed pods to exceed the desired replica count, the ReplicaSet will terminate the excess pod(s) to maintain the desired state. This can lead to unintended pod termination."
    q3: "You can isolate a pod from ReplicaSet management by changing its labels so they no longer match the ReplicaSet's selector. The pod will continue running but will no longer be managed by the ReplicaSet. The ReplicaSet will then create a new pod to replace the isolated one and maintain the desired count."
    q4: "When you isolate a pod by changing its labels, the ReplicaSet no longer counts it toward the desired replica count. The ReplicaSet will automatically create a new pod with matching labels to restore the desired number of replicas. The isolated pod continues running but is now unmanaged."
    q5: "The recommended best practice is to always use a controller like a ReplicaSet (or better yet, a Deployment) to create and maintain your pods. You should never create a bare pod with a label that matches a controller's selector unless its definition matches the controller's pod template. This prevents unintended adoption and inconsistent pod states."
  
