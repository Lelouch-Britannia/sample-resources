  quiz_explanations:
    q1: "The command 'kubectl scale --replicas=5 rs/web' is used to scale a ReplicaSet. You can also use 'kubectl edit rs web' to manually edit the replicas field, or 'kubectl scale --replicas=5 -f replicaset.yaml' to scale using the definition file."
    q2: "The Horizontal Pod Autoscaler (HPA) automatically adjusts the number of pod replicas in a ReplicaSet based on observed metrics such as CPU utilization or custom metrics. When CPU load increases, HPA can increase replicas (up to a maximum limit), and when load decreases, it can reduce replicas (down to a minimum)."
    q3: "By default, when you delete a ReplicaSet using 'kubectl delete rs ReplicaSet_name' or 'kubectl delete -f definition_file.yaml', both the ReplicaSet and all the pods it manages are deleted. This is the cascade delete behavior, which is enabled by default."
    q4: "The '--cascade=false' flag (or '--cascade=orphan' in newer versions) tells Kubernetes to delete only the ReplicaSet resource itself while keeping all the pods it was managing running. These pods become orphaned - they continue running but are no longer managed by any controller."
    q5: "To get orphaned pods managed again, you need to create a new ReplicaSet with the same selector and pod template as the deleted one. The new ReplicaSet will adopt the existing orphaned pods based on label matching. If you need a different pod template, consider using a Deployment instead, which handles pod replacement in a controlled manner."
    q6: "The command 'kubectl autoscale rs web --max=5' creates a Horizontal Pod Autoscaler for the ReplicaSet named 'web' with a maximum of 5 pods. You can also specify a minimum with '--min' flag. The HPA will automatically scale the ReplicaSet between the min and max values based on resource utilization."
  
