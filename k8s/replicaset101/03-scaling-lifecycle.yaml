quizzes:
  - id: "q1"
    question: "Which command can be used to scale a ReplicaSet named 'web' to 5 replicas?"
    options:
      - id: "a"
        text: "kubectl scale rs web --count=5"
      - id: "b"
        text: "kubectl scale --replicas=5 rs/web"
      - id: "c"
        text: "kubectl resize rs web 5"
      - id: "d"
        text: "kubectl replicas web=5"
  
  - id: "q2"
    question: "What does the Horizontal Pod Autoscaler (HPA) do when used with a ReplicaSet?"
    options:
      - id: "a"
        text: "Automatically creates new ReplicaSets"
      - id: "b"
        text: "Automatically adjusts the number of pod replicas based on metrics like CPU load"
      - id: "c"
        text: "Distributes pods across multiple clusters"
      - id: "d"
        text: "Manages container images automatically"
  
  - id: "q3"
    question: "What happens when you delete a ReplicaSet using 'kubectl delete rs ReplicaSet_name' (without additional flags)?"
    options:
      - id: "a"
        text: "Only the ReplicaSet is deleted, pods continue running"
      - id: "b"
        text: "The ReplicaSet and all pods it manages are deleted"
      - id: "c"
        text: "Nothing happens, deletion is not allowed"
      - id: "d"
        text: "Only half of the pods are deleted"
  
  - id: "q4"
    question: "What does the '--cascade=false' flag do when deleting a ReplicaSet?"
    options:
      - id: "a"
        text: "Deletes the ReplicaSet and all pods immediately"
      - id: "b"
        text: "Prevents the ReplicaSet from being deleted"
      - id: "c"
        text: "Deletes only the ReplicaSet resource while keeping the pods running as orphans"
      - id: "d"
        text: "Creates a backup before deletion"
  
  - id: "q5"
    question: "After deleting a ReplicaSet with '--cascade=false', how can those orphaned pods be managed by a ReplicaSet again?"
    options:
      - id: "a"
        text: "Restart all the pods"
      - id: "b"
        text: "Create a new ReplicaSet with the same selector and pod template"
      - id: "c"
        text: "Run kubectl reconnect command"
      - id: "d"
        text: "It's not possible to re-manage orphaned pods"
  
  - id: "q6"
    question: "Which command would set up autoscaling for a ReplicaSet named 'web' with a maximum of 5 pods?"
    options:
      - id: "a"
        text: "kubectl autoscale rs web --max=5"
      - id: "b"
        text: "kubectl scale rs web --auto --max=5"
      - id: "c"
        text: "kubectl hpa create web --max=5"
      - id: "d"
        text: "kubectl set autoscale web 5"

