  quiz_explanations:
    q1: "The command 'kubectl rollout history deployment/deployment-name' shows the revision history of a deployment. Each time you update the pod template, a new revision is created. You can see all revisions and optionally view details of a specific revision with '--revision=N'."
    q2: "The command 'kubectl rollout undo deployment/deployment-name' rolls back a deployment to the previous revision. This is useful when you discover issues after an update. You can also specify a particular revision with '--to-revision=N' to rollback to a specific version."
    q3: "The command 'kubectl rollout status deployment/deployment-name' monitors the progress of a rollout. It shows the current state of the deployment update and waits until the rollout completes or fails. The output will show 'deployment successfully rolled out' when complete."
    q4: "The command 'kubectl scale deployments/deployment-name --replicas=5' scales a deployment to 5 replicas. You can also use 'kubectl scale -f deployment.yaml --replicas=5' to scale using the definition file, or edit the deployment directly with 'kubectl edit deployment deployment-name' and change the replicas field."
    q5: "During a rollback, the deployment reverts to the previous revision's pod template and performs a rolling update to that version. This means old pods are gradually replaced with pods from the previous revision, maintaining availability. The rollback itself creates a new revision in the history."
    q6: "The command 'kubectl set image deployment/deployment-name container-name=new-image:tag' updates a container's image in a deployment. This triggers a rolling update to the new image. For example: 'kubectl set image deployment/nginx-deployment nginx=nginx:1.27' updates the nginx container to version 1.27."
  
