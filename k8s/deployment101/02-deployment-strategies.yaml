  quiz_explanations:
    q1: "RollingUpdate is the default deployment strategy in Kubernetes. It ensures zero downtime by gradually replacing old pods with new ones. The strategy can be explicitly set with 'strategy.type: RollingUpdate' in the Deployment spec."
    q2: "maxSurge specifies the maximum number of pods that can be created above the desired replica count during an update. maxSurge: 1 means if you have 3 desired replicas, you can temporarily have 4 pods running (3 desired + 1 surge) during the update process."
    q3: "Blue/Green deployment achieves instant cutover by updating the Service selector. Initially, the Service points to Blue pods (version: 1.26). When you're ready to switch, you patch the Service selector to point to Green pods (version: 1.27). This redirects all traffic instantly without pod restarts."
    q4: "In a Canary deployment, traffic is distributed based on the replica count ratio. With 9 stable pods and 1 canary pod (total 10), approximately 90% of traffic goes to stable and 10% to canary. The Service uses round-robin load balancing across all matching endpoints, naturally creating this distribution."
    q5: "The main disadvantage of Rolling Update is that it requires extra resources during the update. With maxSurge configured, you temporarily run more pods than desired. If your cluster is at capacity, the update might get stuck waiting for resources. However, it provides zero downtime for users."
    q6: "Blue/Green provides the fastest rollback. Since both Blue and Green environments are fully deployed and running, rollback is as simple as updating the Service selector back to the Blue version. This takes seconds. Rolling Update and Canary require creating pods or scaling, which takes longer."
    q7: "In a Canary deployment, the Service selector should only include the common label shared by both stable and canary deployments (e.g., app: nginx). If you include track: stable or track: canary, the Service would only route to one deployment, defeating the purpose of canary testing. The common label allows traffic to distribute to all matching pods."
  
  code_solution: null
  validation_script: null
