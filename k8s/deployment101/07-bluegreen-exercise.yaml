            name: nginx
            version: "1.26"
        spec:
          containers: 
            - name: nginx
              image: nginx:1.26-alpine
              ports:
                - name: http
                  containerPort: 80
    
    ---
    # Service (Initially routes to Blue)
    apiVersion: v1
    kind: Service
    metadata: 
      name: nginx
      labels: 
        name: nginx
    spec:
      ports:
        - name: http
          port: 80
          targetPort: 80
      selector: 
        name: nginx
        version: "1.26"  # TODO: Switch to "1.27" to route to Green
