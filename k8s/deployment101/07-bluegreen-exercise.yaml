    # Blue Deployment (Current Production - nginx 1.26)
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: nginx-1.26
    spec:
      replicas: 3
      selector:
        matchLabels:
          name: nginx
          version: "1.26"
      template:
        metadata:
