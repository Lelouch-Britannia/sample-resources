  quiz_explanations:
    q1: "The main advantage of Deployments over ReplicaSets is that Deployments can update pod templates in a controlled way without causing downtime. When you change a Deployment's pod template, it orchestrates a smooth transition from the old version to the new version."
    q2: "ReplicaSets have a major limitation: once you select the pods managed by a ReplicaSet, you cannot change their pod templates. If you need to update the container image or configuration, you must delete the ReplicaSet and recreate it, which causes downtime until the new pods are running."
    q3: "A Deployment uses a ReplicaSet to manage the pods. The Deployment creates and manages ReplicaSets, which in turn manage the actual pods. This abstraction allows the Deployment to handle updates by creating new ReplicaSets while gracefully terminating old ones."
    q4: "The READY column shows the ratio of ready pods to desired pods (e.g., 2/2 means 2 pods are ready out of 2 desired). The UP-TO-DATE column shows how many replicas have been updated to achieve the desired state, and AVAILABLE shows how many replicas are actually available to users."
    q5: "Deployments should be used whenever you need to update applications without downtime or manage rollouts. They are the recommended way to deploy and manage stateless applications in Kubernetes. Use bare ReplicaSets only in specific cases where you don't need update capabilities, though this is rare in production."
  
